<!DOCTYPE html>
<html>
<head>
    <title>SampleSize AI SaaS Platform</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #333; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        input[type="file"] { margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 2s linear infinite; display: none; margin-top: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>SampleSize AI SaaS Platform</h1>
        <p>Upload your research draft, methodology, or hypothesis (PDF or DOCX). Multiple free AI agents will analyze it in parallel to extract study design and compute sample size!</p>

        <div class="box">
            <h3>Upload Document</h3>
            <form id="uploadForm">
                <label for="apiKey">Groq API Key (Optional but recommended):</label><br>
                <input type="password" id="apiKey" name="apiKey" placeholder="gsk_..." style="width: 100%; margin-bottom: 15px; padding: 5px;"><br>

                <label for="fileInput">Document to Analyze (.pdf or .docx):</label><br>
                <input type="file" id="fileInput" name="file" accept=".pdf,.docx" required style="margin-bottom: 15px;">
                <br>
                <button type="submit">Analyze with Free AI Agents</button>
                <div class="loader" id="loader"></div>
            </form>
        </div>

        <div class="box" id="resultBox" style="display: none;">
            <h3>AI Analysis Report</h3>
            <pre id="resultPre"></pre>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const resultPre = document.getElementById('resultPre');

            loader.style.display = 'block';
            resultBox.style.display = 'none';
            resultPre.textContent = '';

            const apiKey = document.getElementById('apiKey').value;
            const headers = {};
            if (apiKey) {
                headers['x-api-key'] = apiKey;
            }

            try {
                const response = await fetch('/analyze_file', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                });
                const data = await response.json();
                resultBox.style.display = 'block';
                resultPre.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultBox.style.display = 'block';
                resultPre.textContent = 'Error: ' + error.message;
            } finally {
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
